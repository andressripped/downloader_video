<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Downloader</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3.4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-zinc-800">
    
    <div class="w-full max-w-lg">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-semibold mb-2 text-white">Social Downloader</h1>
            <p class="text-zinc-500 text-sm">Herramienta de extracción de medios en calidad original.</p>
        </header>

        <main class="bg-zinc-900/50 border border-zinc-800/80 rounded-xl p-6 md:p-8 shadow-sm">
            <form id="downloadForm" class="space-y-4">
                <div>
                    <label for="urlInput" class="block text-xs font-medium text-zinc-500 mb-2 uppercase tracking-wider">URL del Recurso</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-500">
                            <i data-lucide="link" class="w-4 h-4"></i>
                        </div>
                        <input type="url" id="urlInput" required placeholder="https://..." 
                            class="block w-full pl-10 pr-4 py-3 bg-zinc-950/50 border border-zinc-800 rounded-lg focus:ring-1 focus:ring-white focus:border-white transition-all text-zinc-200 placeholder-zinc-600 outline-none text-sm">
                    </div>
                </div>
                <button type="submit" id="submitBtn" 
                    class="w-full py-3 bg-white hover:bg-zinc-200 active:scale-[0.99] text-black font-medium rounded-lg transition-all flex justify-center items-center gap-2 text-sm">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    <span>Analizar Enlace</span>
                </button>
            </form>

            <!-- Loading State -->
            <div id="loading" class="hidden mt-8 text-center animate-fade-in flex flex-col items-center">
                <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-zinc-500 mb-3"></i>
                <p class="text-zinc-500 text-sm">Procesando solicitud...</p>
            </div>

            <!-- Error Alert -->
            <div id="error" class="hidden mt-6 p-4 bg-red-950/30 border border-red-900/50 rounded-lg text-red-400 text-sm flex items-start gap-3 animate-fade-in">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                <span id="errorMessage" class="leading-relaxed"></span>
            </div>

            <!-- Results -->
            <div id="result" class="hidden mt-8 space-y-5">
                <!-- Injected via JS -->
            </div>
        </main>
        
        <footer class="mt-10 text-center text-zinc-600 text-xs flex items-center justify-center gap-1.5">
            <span>Social Downloader v2.0</span>
        </footer>
    </div>

    <script src="/static/script.js?v=7"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
